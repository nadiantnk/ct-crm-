<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КТ Диагностика — CRM</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Onest', sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #f4f6f9; }
    input, select, button, textarea { font-family: 'Onest', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    .slide-in { animation: slideIn 0.25s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;

    const INITIAL_BRANCHES = [
      { id: 1, name: "Северный филиал" },
      { id: 2, name: "Филиал на Керенского" },
      { id: 3, name: "Филиал на Красрабе" },
      { id: 4, name: "Филиал на Алексеева" },
    ];

    const INITIAL_SERVICES = [
      { id: 1, category: "3D исследования", name: "КТ двух челюстей", price: 3500 },
      { id: 2, category: "3D исследования", name: "КТ одной челюсти", price: 2500 },
      { id: 3, category: "3D исследования", name: "КТ одного сегмента", price: 1800 },
      { id: 4, category: "3D исследования", name: "КТ двух сегментов", price: 3000 },
      { id: 5, category: "3D исследования", name: "КТ в области 2–3 зубов", price: 1500 },
      { id: 6, category: "3D исследования", name: "КТ ВНЧС", price: 3200 },
      { id: 7, category: "2D исследования", name: "ОПТГ", price: 1200 },
      { id: 8, category: "2D исследования", name: "ТРГ прямая", price: 1100 },
      { id: 9, category: "2D исследования", name: "ТРГ боковая", price: 1100 },
      { id: 10, category: "2D исследования", name: "Зонограмма", price: 1300 },
      { id: 11, category: "Пакетные услуги", name: "Ортодонт 3", price: 4500 },
      { id: 12, category: "Пакетные услуги", name: "Комплекс 1", price: 5000 },
      { id: 13, category: "Пакетные услуги", name: "Ортодонт 4", price: 5500 },
    ];

    const INITIAL_CLINICS = [
      { id: 1, name: "Стоматология Улыбка" },
      { id: 2, name: "Дентал Плюс" },
      { id: 3, name: "Клиника Здоровье" },
      { id: 4, name: "МедЦентр" },
      { id: 5, name: "Стоматология на Мира" },
    ];

    const TIME_SLOTS = [];
    for (let h = 9; h <= 20; h++) {
      for (let m = 0; m < 60; m += 30) {
        if (h === 20 && m > 0) break;
        TIME_SLOTS.push(`${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`);
      }
    }

    const PAYMENT_METHODS = ["наличные", "безнал", "перевод", "смешанная"];

    function formatPhone(raw) {
      const digits = raw.replace(/\D/g, "");
      const d = digits.startsWith("7") ? digits : digits.startsWith("8") ? "7" + digits.slice(1) : "7" + digits;
      const p = d.slice(0, 11);
      if (p.length <= 1) return "+7";
      if (p.length <= 4) return `+7 (${p.slice(1)}`;
      if (p.length <= 7) return `+7 (${p.slice(1, 4)}) ${p.slice(4)}`;
      if (p.length <= 9) return `+7 (${p.slice(1, 4)}) ${p.slice(4, 7)}-${p.slice(7)}`;
      return `+7 (${p.slice(1, 4)}) ${p.slice(4, 7)}-${p.slice(7, 9)}-${p.slice(9, 11)}`;
    }

    function capitalizeWords(str) {
      return str.replace(/(^|\s|-)\S/g, ch => ch.toUpperCase());
    }

    function clampDiscount(val) {
      const num = String(val).replace(/[^0-9]/g, "");
      const n = Number(num);
      if (isNaN(n) || num === "") return 0;
      return Math.min(100, Math.max(0, n));
    }

    function clampPrice(val) {
      const num = String(val).replace(/[^0-9]/g, "");
      return num === "" ? "" : Number(num);
    }

    function isPhoneComplete(phone) {
      return phone.replace(/\D/g, "").length >= 11;
    }

    function isValidBirth(date) {
      if (!date) return true;
      const d = new Date(date);
      const now = new Date();
      const min = new Date("1900-01-01");
      return d >= min && d <= now;
    }

    const MAX_TEXT_LENGTH = 100;

    const STATUS_COLORS = {
      came_paid: { bg: "#dcfce7", border: "#22c55e", dot: "#16a34a", label: "Пришёл · Оплачено" },
      came_unpaid: { bg: "#fef9c3", border: "#eab308", dot: "#ca8a04", label: "Пришёл · Не оплачено" },
      no_show: { bg: "#fee2e2", border: "#ef4444", dot: "#dc2626", label: "Не пришёл" },
      default: { bg: "#f0f9ff", border: "#3b82f6", dot: "#2563eb", label: "Записан" },
    };

    function getStatusKey(came, paid) {
      if (came && paid) return "came_paid";
      if (came && !paid) return "came_unpaid";
      if (!came && came !== null) return "no_show";
      return "default";
    }

    function Modal({ children, onClose, title, wide }) {
      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.45)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
          <div className="slide-in" onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: 16, width: wide ? 640 : 480, maxHeight: "90vh", overflow: "auto", boxShadow: "0 25px 60px rgba(0,0,0,0.15)" }}>
            <div style={{ padding: "20px 24px", borderBottom: "1px solid #e2e8f0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 600, color: "#1e293b" }}>{title}</h2>
              <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#94a3b8", padding: "4px 8px", borderRadius: 6 }}>✕</button>
            </div>
            <div style={{ padding: 24 }}>{children}</div>
          </div>
        </div>
      );
    }

    function Input({ label, value, onChange, type = "text", placeholder, style: sx, maxLength }) {
      return (
        <div style={{ marginBottom: 14, ...sx }}>
          {label && <label style={{ display: "block", fontSize: 13, fontWeight: 500, color: "#64748b", marginBottom: 5 }}>{label}{maxLength && value?.length > maxLength * 0.8 ? <span style={{ float: "right", fontSize: 11, color: value.length >= maxLength ? "#dc2626" : "#94a3b8" }}>{value.length}/{maxLength}</span> : null}</label>}
          <input type={type} value={value} onChange={e => onChange(maxLength ? e.target.value.slice(0, maxLength) : e.target.value)} placeholder={placeholder}
            style={{ width: "100%", padding: "9px 12px", border: "1.5px solid #e2e8f0", borderRadius: 8, fontSize: 14, outline: "none", transition: "border 0.2s", background: "#f8fafc" }}
            onFocus={e => e.target.style.borderColor = "#0d9488"} onBlur={e => e.target.style.borderColor = "#e2e8f0"} />
        </div>
      );
    }

    function Select({ label, value, onChange, options, placeholder }) {
      return (
        <div style={{ marginBottom: 14 }}>
          {label && <label style={{ display: "block", fontSize: 13, fontWeight: 500, color: "#64748b", marginBottom: 5 }}>{label}</label>}
          <select value={value} onChange={e => onChange(e.target.value)}
            style={{ width: "100%", padding: "9px 12px", border: "1.5px solid #e2e8f0", borderRadius: 8, fontSize: 14, outline: "none", background: "#f8fafc", cursor: "pointer" }}>
            {placeholder && <option value="">{placeholder}</option>}
            {options.map((o, i) => <option key={i} value={typeof o === "string" ? o : o.value}>{typeof o === "string" ? o : o.label}</option>)}
          </select>
        </div>
      );
    }

    function SearchableSelect({ label, value, onChange, options, placeholder }) {
      const [open, setOpen] = useState(false);
      const [search, setSearch] = useState("");
      const sorted = [...options].sort((a, b) => {
        const la = (typeof a === "string" ? a : a.label).toLowerCase();
        const lb = (typeof b === "string" ? b : b.label).toLowerCase();
        return la.localeCompare(lb, "ru");
      });
      const filtered = sorted.filter(o => {
        const l = (typeof o === "string" ? o : o.label).toLowerCase();
        return l.includes(search.toLowerCase());
      });
      const selectedLabel = options.find(o => (typeof o === "string" ? o : o.value) === value);
      const displayLabel = selectedLabel ? (typeof selectedLabel === "string" ? selectedLabel : selectedLabel.label) : "";

      return (
        <div style={{ marginBottom: 14, position: "relative" }}>
          {label && <label style={{ display: "block", fontSize: 13, fontWeight: 500, color: "#64748b", marginBottom: 5 }}>{label}</label>}
          <div onClick={() => setOpen(!open)}
            style={{ width: "100%", padding: "9px 12px", border: `1.5px solid ${open ? "#0d9488" : "#e2e8f0"}`, borderRadius: 8, fontSize: 14, background: "#f8fafc", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", minHeight: 38 }}>
            <span style={{ color: displayLabel ? "#1e293b" : "#94a3b8" }}>{displayLabel || placeholder || "Выберите..."}</span>
            <span style={{ fontSize: 10, color: "#94a3b8" }}>▼</span>
          </div>
          {open && (
            <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "1.5px solid #e2e8f0", borderRadius: 10, marginTop: 4, zIndex: 50, boxShadow: "0 8px 24px rgba(0,0,0,0.12)", maxHeight: 240, display: "flex", flexDirection: "column" }}>
              <div style={{ padding: "8px 8px 4px" }}>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Поиск..." autoFocus
                  style={{ width: "100%", padding: "7px 10px", border: "1.5px solid #e2e8f0", borderRadius: 6, fontSize: 13, outline: "none", background: "#f8fafc" }}
                  onFocus={e => e.target.style.borderColor = "#0d9488"} onBlur={e => e.target.style.borderColor = "#e2e8f0"} />
              </div>
              <div style={{ overflow: "auto", flex: 1 }}>
                {filtered.length === 0 && <div style={{ padding: "10px 12px", fontSize: 13, color: "#94a3b8" }}>Ничего не найдено</div>}
                {filtered.map((o, i) => {
                  const val = typeof o === "string" ? o : o.value;
                  const lab = typeof o === "string" ? o : o.label;
                  return (
                    <div key={i} onClick={() => { onChange(val); setOpen(false); setSearch(""); }}
                      style={{ padding: "8px 12px", fontSize: 13, cursor: "pointer", background: val === value ? "#f0fdfa" : "transparent", color: val === value ? "#0d9488" : "#1e293b", fontWeight: val === value ? 500 : 400 }}
                      onMouseEnter={e => { if (val !== value) e.currentTarget.style.background = "#f8fafc"; }}
                      onMouseLeave={e => { if (val !== value) e.currentTarget.style.background = "transparent"; }}>
                      {lab}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {open && <div onClick={() => { setOpen(false); setSearch(""); }} style={{ position: "fixed", inset: 0, zIndex: 49 }} />}
        </div>
      );
    }

    function Btn({ children, onClick, variant = "primary", style: sx, disabled }) {
      const styles = {
        primary: { background: "#0d9488", color: "#fff", border: "none" },
        secondary: { background: "#f1f5f9", color: "#475569", border: "1px solid #e2e8f0" },
        danger: { background: "#fef2f2", color: "#dc2626", border: "1px solid #fecaca" },
      };
      return (
        <button onClick={onClick} disabled={disabled}
          style={{ padding: "9px 18px", borderRadius: 8, fontSize: 14, fontWeight: 500, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.5 : 1, transition: "all 0.15s", ...styles[variant], ...sx }}>
          {children}
        </button>
      );
    }

    function LoginScreen({ onLogin }) {
      const [u, setU] = useState("");
      const [p, setP] = useState("");
      const [err, setErr] = useState("");
      const handleLogin = () => {
        if (u === "admin" && p === "admin") { onLogin(); }
        else { setErr("Неверный логин или пароль"); }
      };
      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f766e 100%)" }}>
          <div className="fade-in" style={{ background: "#fff", borderRadius: 20, padding: "48px 40px", width: 400, boxShadow: "0 30px 80px rgba(0,0,0,0.25)" }}>
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ width: 56, height: 56, background: "#0d9488", borderRadius: 14, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}>
                <span style={{ fontSize: 26, filter: "grayscale(1) brightness(10)" }}>🦷</span>
              </div>
              <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#1e293b" }}>КТ Диагностика</h1>
              <p style={{ margin: "6px 0 0", color: "#94a3b8", fontSize: 14 }}>Система записи пациентов</p>
            </div>
            <Input label="Логин" value={u} onChange={setU} placeholder="admin" />
            <Input label="Пароль" value={p} onChange={setP} type="password" placeholder="admin" />
            {err && <p style={{ color: "#dc2626", fontSize: 13, margin: "0 0 12px" }}>{err}</p>}
            <Btn onClick={handleLogin} style={{ width: "100%", padding: "12px", fontSize: 15, marginTop: 8 }}>Войти</Btn>
            <p style={{ textAlign: "center", color: "#94a3b8", fontSize: 12, marginTop: 16 }}>Логин: admin / Пароль: admin</p>
          </div>
        </div>
      );
    }

    function BookingModal({ slot, branches, clinics, services, onSave, onClose, existing, appointments }) {
      const [form, setForm] = useState(existing || {
        name: "", phone: "+7", birth: "", email: "",
        branchId: branches[0]?.id || "", clinicId: "", serviceId: "",
        discount: 0, paymentMethod: "наличные",
        came: null, paid: false,
      });
      const [errors, setErrors] = useState({});
      const [duplicateWarning, setDuplicateWarning] = useState(null);

      const service = services.find(s => s.id === Number(form.serviceId));
      const basePrice = service?.price || 0;
      const discount = clampDiscount(form.discount);
      const finalPrice = Math.round(basePrice * (1 - discount / 100));

      const set = (k, v) => { setForm(prev => ({ ...prev, [k]: v })); setErrors(prev => ({ ...prev, [k]: null })); };

      const doSave = () => {
        onSave({ ...form, discount, price: basePrice, finalPrice, time: slot });
      };

      const handleSave = () => {
        const errs = {};
        if (!form.name.trim()) errs.name = "Заполните ФИО";
        if (!isPhoneComplete(form.phone)) errs.phone = "Введите полный номер";
        if (!form.serviceId) errs.serviceId = "Выберите услугу";
        if (form.birth && !isValidBirth(form.birth)) errs.birth = "Дата от 1900 до сегодня";
        if (Object.keys(errs).length > 0) { setErrors(errs); return; }

        const phoneDigits = form.phone.replace(/\D/g, "");
        const duplicate = appointments?.find(a => a.phone?.replace(/\D/g, "") === phoneDigits && (!existing || a.id !== existing.id));
        if (duplicate) {
          setDuplicateWarning(duplicate.name);
          return;
        }
        doSave();
      };

      const serviceOptions = services.map(s => ({ value: String(s.id), label: `${s.name} — ${s.price}₽` }));
      const clinicOptions = [...clinics].sort((a, b) => a.name.localeCompare(b.name, "ru")).map(c => ({ value: String(c.id), label: c.name }));

      const errStyle = { fontSize: 11, color: "#dc2626", marginTop: 2 };

      return (
        <Modal title={existing ? "Редактировать запись" : `Запись на ${slot}`} onClose={onClose} wide>
          {duplicateWarning && (
            <div style={{ background: "#fef9c3", border: "1.5px solid #eab308", borderRadius: 10, padding: "12px 16px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
              <div style={{ fontSize: 13, color: "#92400e" }}>Пациент с таким номером уже есть: <b>{duplicateWarning}</b>. Сохранить?</div>
              <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                <Btn onClick={() => { setDuplicateWarning(null); doSave(); }} style={{ padding: "6px 14px", fontSize: 13 }}>Да, сохранить</Btn>
                <Btn variant="secondary" onClick={() => setDuplicateWarning(null)} style={{ padding: "6px 14px", fontSize: 13 }}>Отмена</Btn>
              </div>
            </div>
          )}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
            <div><Input label="ФИО *" value={form.name} onChange={v => set("name", capitalizeWords(v))} placeholder="Иванов Иван Иванович" maxLength={MAX_TEXT_LENGTH} />{errors.name && <div style={errStyle}>{errors.name}</div>}</div>
            <div><Input label="Телефон *" value={form.phone} onChange={v => set("phone", formatPhone(v))} placeholder="+7 (999) 123-45-67" />{errors.phone && <div style={errStyle}>{errors.phone}</div>}</div>
            <div><Input label="Дата рождения" value={form.birth} onChange={v => set("birth", v)} type="date" />{errors.birth && <div style={errStyle}>{errors.birth}</div>}</div>
            <Input label="Email" value={form.email} onChange={v => set("email", v)} placeholder="email@example.com" />
            <SearchableSelect label="Направляющая клиника" value={form.clinicId} onChange={v => set("clinicId", v)} options={clinicOptions} placeholder="Выберите клинику" />
            <div><Select label="Тип исследования *" value={form.serviceId} onChange={v => set("serviceId", v)} options={serviceOptions} placeholder="Выберите услугу" />{errors.serviceId && <div style={errStyle}>{errors.serviceId}</div>}</div>
            <Input label="Скидка (%) макс. 100" value={form.discount} onChange={v => set("discount", clampDiscount(v))} />
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: "block", fontSize: 13, fontWeight: 500, color: "#64748b", marginBottom: 5 }}>Итого</label>
              <div style={{ padding: "9px 12px", background: "#f0fdfa", border: "1.5px solid #99f6e4", borderRadius: 8, fontSize: 16, fontWeight: 600, color: "#0d9488" }}>
                {finalPrice} ₽ {discount > 0 && <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 400, textDecoration: "line-through", marginLeft: 8 }}>{basePrice} ₽</span>}
              </div>
            </div>
            <Select label="Способ оплаты" value={form.paymentMethod} onChange={v => set("paymentMethod", v)} options={PAYMENT_METHODS} />
            <Select label="Статус пациента" value={form.came === null ? "" : form.came ? "yes" : "no"} onChange={v => set("came", v === "yes" ? true : v === "no" ? false : null)} options={[{ value: "", label: "—" }, { value: "yes", label: "Пришёл" }, { value: "no", label: "Не пришёл" }]} />
            <Select label="Статус оплаты" value={form.paid ? "yes" : "no"} onChange={v => set("paid", v === "yes")} options={[{ value: "no", label: "Не оплачено" }, { value: "yes", label: "Оплачено" }]} />
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 20, paddingTop: 16, borderTop: "1px solid #f1f5f9" }}>
            <Btn variant="secondary" onClick={onClose}>Отмена</Btn>
            <Btn onClick={handleSave}>Сохранить</Btn>
          </div>
        </Modal>
      );
    }

    function ScheduleView({ appointments, branches, clinics, services, selectedBranch, selectedDate, onBook, onEdit, filters, setFilters }) {
      const [search, setSearch] = useState("");

      const branchDateAppts = appointments.filter(a => a.branchId === selectedBranch && a.date === selectedDate);

      const occupiedByTime = {};
      branchDateAppts.forEach(a => { occupiedByTime[a.time] = a; });

      const filtered = branchDateAppts.filter(a => {
        if (filters.clinicId && String(a.clinicId) !== filters.clinicId) return false;
        if (filters.serviceId && String(a.serviceId) !== filters.serviceId) return false;
        if (search) {
          const q = search.toLowerCase();
          const matchName = a.name?.toLowerCase().includes(q);
          const matchPhone = a.phone?.replace(/\D/g, "").includes(q.replace(/\D/g, ""));
          if (!matchName && !matchPhone) return false;
        }
        return true;
      });

      const filteredByTime = {};
      filtered.forEach(a => { filteredByTime[a.time] = a; });

      const hasActiveFilters = !!(filters.clinicId || filters.serviceId || search);

      return (
        <div>
          <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap", alignItems: "flex-end" }}>
            <Input label="Дата" type="date" value={selectedDate} onChange={v => setFilters(f => ({ ...f, date: v }))} style={{ marginBottom: 0, width: 180 }} />
            <div style={{ marginBottom: 0 }}>
              <label style={{ display: "block", fontSize: 13, fontWeight: 500, color: "#64748b", marginBottom: 5 }}>Поиск по ФИО / телефону</label>
              <div style={{ position: "relative" }}>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Иванов или 9991234567"
                  style={{ padding: "9px 12px 9px 34px", border: "1.5px solid #e2e8f0", borderRadius: 8, fontSize: 14, outline: "none", background: "#f8fafc", minWidth: 220, transition: "border 0.2s" }}
                  onFocus={e => e.target.style.borderColor = "#0d9488"} onBlur={e => e.target.style.borderColor = "#e2e8f0"} />
                <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", fontSize: 14, color: "#94a3b8", pointerEvents: "none" }}>🔍</span>
              </div>
            </div>
            <div style={{ marginBottom: 0 }}>
              <label style={{ display: "block", fontSize: 13, fontWeight: 500, color: "#64748b", marginBottom: 5 }}>Клиника</label>
              <select value={filters.clinicId} onChange={e => setFilters(f => ({ ...f, clinicId: e.target.value }))}

    function ReportsView({ appointments, branches, services }) {
      const [period, setPeriod] = useState("day");
      const today = new Date().toISOString().split("T")[0];
      const currentMonth = today.slice(0, 7);

      const filtered = appointments.filter(a => {
        if (period === "day") return a.date === today;
        return a.date?.startsWith(currentMonth);
      });

      const totalRevenue = filtered.filter(a => a.paid).reduce((s, a) => s + (a.finalPrice || 0), 0);
      const totalPatients = filtered.length;

      const byBranch = branches.map(b => {
        const ba = filtered.filter(a => a.branchId === b.id);
        return {
          branch: b.name,
          patients: ba.length,
          revenue: ba.filter(a => a.paid).reduce((s, a) => s + (a.finalPrice || 0), 0),
        };
      });

      const byPayment = {};
      PAYMENT_METHODS.forEach(m => { byPayment[m] = { count: 0, sum: 0 }; });
      filtered.filter(a => a.paid).forEach(a => {
        const m = a.paymentMethod || "наличные";
        if (byPayment[m]) { byPayment[m].count++; byPayment[m].sum += (a.finalPrice || 0); }
      });

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
            <h2 style={{ margin: 0, fontSize: 20, fontWeight: 600, color: "#1e293b" }}>Отчёты</h2>
            <div style={{ display: "flex", gap: 4, background: "#f1f5f9", borderRadius: 10, padding: 3 }}>
              {[["day", "За день"], ["month", "За месяц"]].map(([k, l]) => (
                <button key={k} onClick={() => setPeriod(k)}
                  style={{ padding: "8px 18px", borderRadius: 8, border: "none", fontSize: 13, fontWeight: 500, cursor: "pointer", background: period === k ? "#fff" : "transparent", color: period === k ? "#0d9488" : "#64748b", boxShadow: period === k ? "0 1px 4px rgba(0,0,0,0.08)" : "none" }}>
                  {l}
                </button>
              ))}
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
            <div style={{ background: "#fff", borderRadius: 14, padding: 20, border: "1px solid #e2e8f0" }}>
              <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 4 }}>Общая выручка</div>
              <div style={{ fontSize: 28, fontWeight: 700, color: "#0d9488" }}>{totalRevenue.toLocaleString()} ₽</div>
            </div>
            <div style={{ background: "#fff", borderRadius: 14, padding: 20, border: "1px solid #e2e8f0" }}>
              <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 4 }}>Пациентов</div>
              <div style={{ fontSize: 28, fontWeight: 700, color: "#1e293b" }}>{totalPatients}</div>
            </div>
          </div>

          <h3 style={{ fontSize: 16, fontWeight: 600, color: "#1e293b", marginBottom: 12 }}>По способу оплаты</h3>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12, marginBottom: 24 }}>
            {PAYMENT_METHODS.map(m => (
              <div key={m} style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", border: "1px solid #e2e8f0" }}>
                <div style={{ fontSize: 12, color: "#94a3b8", marginBottom: 4, textTransform: "capitalize" }}>{m}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#1e293b" }}>{byPayment[m].sum.toLocaleString()} ₽</div>
                <div style={{ fontSize: 12, color: "#94a3b8" }}>{byPayment[m].count} оплат</div>
              </div>
            ))}
          </div>

          <h3 style={{ fontSize: 16, fontWeight: 600, color: "#1e293b", marginBottom: 12 }}>По филиалам</h3>
          <div style={{ background: "#fff", borderRadius: 14, border: "1px solid #e2e8f0", overflow: "hidden" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 120px 140px", padding: "10px 16px", borderBottom: "1px solid #e2e8f0", fontSize: 12, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5 }}>
              <span>Филиал</span><span style={{ textAlign: "center" }}>Пациентов</span><span style={{ textAlign: "right" }}>Выручка</span>
            </div>

              <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 120px 140px", padding: "14px 16px", borderBottom: i < byBranch.length - 1 ? "1px solid #f1f5f9" : "none" }}>
                <span style={{ fontSize: 14, color: "#1e293b" }}>{b.branch}</span>
                <span style={{ textAlign: "center", fontSize: 14, color: "#475569" }}>{b.patients}</span>
                <span style={{ textAlign: "right", fontSize: 14, fontWeight: 600, color: "#0d9488" }}>{b.revenue.toLocaleString()} ₽</span>
              </div>
            ))}
          </div>
        </div>
      );

    }

    function App() {
      const [auth, setAuth] = useState(false);
      const [section, setSection] = useState("schedule");
      const [branches, setBranches] = useState(INITIAL_BRANCHES);
      const [clinics, setClinics] = useState(INITIAL_CLINICS);
      const [services, setServices] = useState(INITIAL_SERVICES);
      const [appointments, setAppointments] = useState([]);
      const [selectedBranch, setSelectedBranch] = useState(INITIAL_BRANCHES[0].id);
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split("T")[0]);
      const [bookingSlot, setBookingSlot] = useState(null);
      const [editingAppt, setEditingAppt] = useState(null);
      const [filters, setFilters] = useState({ clinicId: "", serviceId: "" });

      const handleDateChange = useCallback((f) => {
        if (typeof f === "function") {
          setFilters(prev => {
            const next = f(prev);
            if (next.date) { setSelectedDate(next.date); }
            return next;
          });
        }
      }, []);

      const handleSaveBooking = (data) => {
        if (editingAppt) {
          setAppointments(prev => prev.map(a => a.id === editingAppt.id ? { ...a, ...data } : a));
          setEditingAppt(null);
        } else {
          const conflict = appointments.find(a => a.time === data.time && a.date === selectedDate && a.branchId === selectedBranch);
          if (conflict) {
            alert("Этот слот уже занят! Выберите другое время.");
            return;
          }
          setAppointments(prev => [...prev, { ...data, id: Date.now(), date: selectedDate, branchId: selectedBranch }]);
          setBookingSlot(null);
        }
      };

      const handleDeleteAppt = (id) => {
        setAppointments(prev => prev.filter(a => a.id !== id));
        setEditingAppt(null);
      };

      if (!auth) return <LoginScreen onLogin={() => setAuth(true)} />;

      const NAV = [
        { id: "schedule", icon: "📅", label: "Записи" },
        { id: "clinics", icon: "🏥", label: "Клиники" },
        { id: "services", icon: "🔬", label: "Услуги" },
        { id: "reports", icon: "📊", label: "Отчёты" },
        { id: "settings", icon: "⚙️", label: "Настройки" },
      ];

      return (
        <div style={{ display: "flex", minHeight: "100vh" }}>
          <div style={{ width: 220, background: "#0f172a", display: "flex", flexDirection: "column", flexShrink: 0 }}>
            <div style={{ padding: "20px 16px", borderBottom: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 36, height: 36, background: "#0d9488", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <span style={{ fontSize: 18, filter: "grayscale(1) brightness(10)" }}>🦷</span>
              </div>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#f1f5f9" }}>КТ Центр</div>
                <div style={{ fontSize: 11, color: "#64748b" }}>CRM</div>
              </div>
            </div>

            <nav style={{ padding: "12px 8px", flex: 1 }}>
              {NAV.map(n => (
                <button key={n.id} onClick={() => setSection(n.id)}
                  style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "10px 12px", borderRadius: 10, border: "none", background: section === n.id ? "rgba(13,148,136,0.15)" : "transparent", color: section === n.id ? "#5eead4" : "#94a3b8", fontSize: 14, fontWeight: 500, cursor: "pointer", marginBottom: 2, transition: "all 0.15s", textAlign: "left" }}>
                  <span style={{ fontSize: 16 }}>{n.icon}</span> {n.label}
                </button>
              ))}
            </nav>

            <div style={{ padding: "16px", borderTop: "1px solid rgba(255,255,255,0.08)" }}>
              <button onClick={() => setAuth(false)} style={{ width: "100%", padding: "8px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "#94a3b8", fontSize: 13, cursor: "pointer" }}>
                Выйти
              </button>
            </div>
          </div>

          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            <div style={{ padding: "12px 24px", background: "#fff", borderBottom: "1px solid #e2e8f0", display: "flex", alignItems: "center", gap: 12, flexShrink: 0 }}>
              <span style={{ fontSize: 13, color: "#94a3b8", marginRight: 4 }}>Филиал:</span>
              <div style={{ display: "flex", gap: 4, background: "#f1f5f9", borderRadius: 10, padding: 3, flexWrap: "wrap" }}>
                {branches.map(b => (
                  <button key={b.id} onClick={() => setSelectedBranch(b.id)}
                    style={{ padding: "7px 14px", borderRadius: 8, border: "none", fontSize: 13, fontWeight: 500, cursor: "pointer", background: selectedBranch === b.id ? "#fff" : "transparent", color: selectedBranch === b.id ? "#0d9488" : "#64748b", boxShadow: selectedBranch === b.id ? "0 1px 4px rgba(0,0,0,0.08)" : "none", transition: "all 0.15s" }}>
                    {b.name}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ flex: 1, overflow: "auto", padding: 24 }} className="fade-in" key={section}>
              {section === "schedule" && (
                <ScheduleView appointments={appointments} branches={branches} clinics={clinics} services={services} selectedBranch={selectedBranch} selectedDate={selectedDate} onBook={setBookingSlot} onEdit={setEditingAppt} filters={filters} setFilters={handleDateChange} />
              )}
              {section === "clinics" && <ClinicsView clinics={clinics} setClinics={setClinics} />}
              {section === "services" && <ServicesView services={services} setServices={setServices} />}
              {section === "reports" && <ReportsView appointments={appointments} branches={branches} services={services} />}
              {section === "settings" && <SettingsView branches={branches} setBranches={setBranches} />}
            </div>
          </div>

          {bookingSlot && (
            <BookingModal slot={bookingSlot} branches={branches} clinics={clinics} services={services} onSave={handleSaveBooking} onClose={() => setBookingSlot(null)} appointments={appointments} />
          )}

          {editingAppt && (
            <Modal title={`Запись на ${editingAppt.time}`} onClose={() => setEditingAppt(null)} wide>
              <BookingModalInner appt={editingAppt} branches={branches} clinics={clinics} services={services} onSave={handleSaveBooking} onClose={() => setEditingAppt(null)} onDelete={() => handleDeleteAppt(editingAppt.id)} appointments={appointments} />
            </Modal>
          )}
        </div>
      );
    }

    function BookingModalInner({ appt, branches, clinics, services, onSave, onClose, onDelete, appointments }) {
      const [form, setForm] = useState({
        name: appt.name, phone: appt.phone, birth: appt.birth || "", email: appt.email || "",
        branchId: appt.branchId, clinicId: appt.clinicId || "", serviceId: String(appt.serviceId) || "",
        discount: appt.discount || 0, paymentMethod: appt.paymentMethod || "наличные",
        came: appt.came, paid: appt.paid || false,
      });
      const [errors, setErrors] = useState({});

      const service = services.find(s => s.id === Number(form.serviceId));
      const basePrice = service?.price || 0;
      const discount = clampDiscount(form.discount);
      const finalPrice = Math.round(basePrice * (1 - discount / 100));
      const set = (k, v) => { setForm(prev => ({ ...prev, [k]: v })); setErrors(prev => ({ ...prev, [k]: null })); };

      const handleSave = () => {
        const errs = {};
        if (!form.name.trim()) errs.name = "Заполните ФИО";
        if (!isPhoneComplete(form.phone)) errs.phone = "Введите полный номер";
        if (!form.serviceId) errs.serviceId = "Выберите услугу";
        if (form.birth && !isValidBirth(form.birth)) errs.birth = "Дата от 1900 до сегодня";
        if (Object.keys(errs).length > 0) { setErrors(errs); return; }
        onSave({ ...form, discount, price: basePrice, finalPrice, time: appt.time });
      };

      const handleDelete = () => {
        if (window.confirm(`Удалить запись ${appt.name} на ${appt.time}?`)) onDelete();
      };

      const serviceOptions = services.map(s => ({ value: String(s.id), label: `${s.name} — ${s.price}₽` }));
      const clinicOptions = [...clinics].sort((a, b) => a.name.localeCompare(b.name, "ru")).map(c => ({ value: String(c.id), label: c.name }));
      const errStyle = { fontSize: 11, color: "#dc2626", marginTop: 2 };

      return (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
            <div><Input label="ФИО *" value={form.name} onChange={v => set("name", capitalizeWords(v))} maxLength={MAX_TEXT_LENGTH} />{errors.name && <div style={errStyle}>{errors.name}</div>}</div>
            <div><Input label="Телефон *" value={form.phone} onChange={v => set("phone", formatPhone(v))} />{errors.phone && <div style={errStyle}>{errors.phone}</div>}</div>
            <div><Input label="Дата рождения" value={form.birth} onChange={v => set("birth", v)} type="date" />{errors.birth && <div style={errStyle}>{errors.birth}</div>}</div>
            <Input label="Email" value={form.email} onChange={v => set("email", v)} />
            <SearchableSelect label="Направляющая клиника" value={form.clinicId} onChange={v => set("clinicId", v)} options={clinicOptions} placeholder="Выберите клинику" />
            <Select label="Тип исследования *" value={form.serviceId} onChange={v => set("serviceId", v)} options={serviceOptions} placeholder="Выберите услугу" />
            <Input label="Скидка (%) макс. 100" value={form.discount} onChange={v => set("discount", clampDiscount(v))} />
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: "block", fontSize: 13, fontWeight: 500, color: "#64748b", marginBottom: 5 }}>Итого</label>
              <div style={{ padding: "9px 12px", background: "#f0fdfa", border: "1.5px solid #99f6e4", borderRadius: 8, fontSize: 16, fontWeight: 600, color: "#0d9488" }}>
                {finalPrice} ₽ {discount > 0 && <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 400, textDecoration: "line-through", marginLeft: 8 }}>{basePrice} ₽</span>}
              </div>
            </div>
            <Select label="Способ оплаты" value={form.paymentMethod} onChange={v => set("paymentMethod", v)} options={PAYMENT_METHODS} />
            <Select label="Статус пациента" value={form.came === null ? "" : form.came ? "yes" : "no"} onChange={v => set("came", v === "yes" ? true : v === "no" ? false : null)} options={[{ value: "", label: "—" }, { value: "yes", label: "Пришёл" }, { value: "no", label: "Не пришёл" }]} />
            <Select label="Статус оплаты" value={form.paid ? "yes" : "no"} onChange={v => set("paid", v === "yes")} options={[{ value: "no", label: "Не оплачено" }, { value: "yes", label: "Оплачено" }]} />
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "space-between", marginTop: 20, paddingTop: 16, borderTop: "1px solid #f1f5f9" }}>
            <Btn variant="danger" onClick={handleDelete}>Удалить запись</Btn>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn variant="secondary" onClick={onClose}>Отмена</Btn>
              <Btn onClick={handleSave}>Сохранить</Btn>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
